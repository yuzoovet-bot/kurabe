<html lang="ja">
<head>

  * { box-sizing: border-box; margin: 0; padding: 0; }

  button { font-family: inherit; cursor: pointer; }

<body>
<div id="app"></div>
<script>
function getApiKey() { return localStorage.getItem("kurabe_api_key") || ""; }
function saveApiKey(k) { localStorage.setItem("kurabe_api_key", k); }

const C = {
  bg: "#FFF1F3", accent: "#F472B6", accentDark: "#DB2777",
  accentLight: "#FDF2F8", accentBorder: "#FBCFE8",
  text: "#831843", textMuted: "#BE185D", border: "#FCE7F3",
  shadow: "0 4px 20px rgba(244,114,182,0.10)",
  shadowSm: "0 2px 8px rgba(244,114,182,0.08)",
};

const STORAGE_KEY = "kurabe_v1";
function load() {
  try {
    const old = localStorage.getItem("kurabe_simple_v1");
    if (old && !localStorage.getItem(STORAGE_KEY)) {
      localStorage.setItem(STORAGE_KEY, old);
      localStorage.removeItem("kurabe_simple_v1");
    }
    const r = localStorage.getItem(STORAGE_KEY);
    return r ? JSON.parse(r) : { categories: [] };
  } catch { return { categories: [] }; }
}
function save(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function exportData() {
  const W = 720, PAD = 48, LINE = 44, CARD_PAD = 32;
  const cats = state.categories.filter(c => c.items.length > 0 || c.name);

  // 高さを計算
  let totalH = PAD * 2 + 80; // header
  cats.forEach(cat => {
    totalH += 56 + CARD_PAD; // カテゴリ見出し
    totalH += (cat.items.length || 1) * LINE + CARD_PAD;
  });
  totalH = Math.max(totalH, 400);

  const canvas = document.createElement("canvas");
  const DPR = 2;
  canvas.width = W * DPR;
  canvas.height = totalH * DPR;
  const ctx = canvas.getContext("2d");
  ctx.scale(DPR, DPR);

  // 背景グラデーション
  const grad = ctx.createLinearGradient(0, 0, W, totalH);
  grad.addColorStop(0, "#FFF1F3");
  grad.addColorStop(1, "#FDF2F8");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, totalH);

  // ヘッダー
  ctx.fillStyle = "#F472B6";
  ctx.beginPath();
  ctx.roundRect(PAD, PAD, W - PAD * 2, 72, 20);
  ctx.fill();
  ctx.fillStyle = "white";
  ctx.font = "bold 28px -apple-system, 'Hiragino Sans', sans-serif";
  ctx.fillText("🛍️ KuraBe", PAD + 20, PAD + 46);
  ctx.font = "14px -apple-system, 'Hiragino Sans', sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillText("✦ 買い物上手の比較メモ ✦", PAD + 20, PAD + 66);

  let y = PAD + 72 + 24;

  cats.forEach(cat => {
    // カテゴリカード背景
    const itemCount = cat.items.length || 1;
    const cardH = 48 + itemCount * LINE + CARD_PAD;
    ctx.fillStyle = "white";
    ctx.shadowColor = "rgba(244,114,182,0.12)";
    ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.roundRect(PAD, y, W - PAD * 2, cardH, 16);
    ctx.fill();
    ctx.shadowBlur = 0;

    // カテゴリ名
    ctx.fillStyle = "#831843";
    ctx.font = "bold 20px -apple-system, 'Hiragino Sans', sans-serif";
    ctx.fillText("■ " + cat.name, PAD + 20, y + 34);

    // 区切り線
    ctx.strokeStyle = "#FCE7F3";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PAD + 16, y + 46);
    ctx.lineTo(W - PAD - 16, y + 46);
    ctx.stroke();

    let iy = y + 46 + LINE * 0.7;
    if (cat.items.length === 0) {
      ctx.fillStyle = "#FBCFE8";
      ctx.font = "14px -apple-system, 'Hiragino Sans', sans-serif";
      ctx.fillText("候補なし", PAD + 24, iy);
    } else {
      cat.items.forEach((item, i) => {
        const isWin = aiWinner && item.id === aiWinner;
        if (isWin) {
          ctx.fillStyle = "#FDF2F8";
          ctx.beginPath();
          ctx.roundRect(PAD + 12, iy - LINE * 0.7 + 4, W - PAD * 2 - 24, LINE - 4, 10);
          ctx.fill();
        }
        ctx.fillStyle = isWin ? "#DB2777" : "#BE185D";
        ctx.font = isWin ? "bold 16px -apple-system, 'Hiragino Sans', sans-serif" : "15px -apple-system, 'Hiragino Sans', sans-serif";
        const label = `${i + 1}.  ${item.name || "（名前なし）"}`;
        ctx.fillText(label, PAD + 24, iy);
        if (isWin) {
          ctx.fillStyle = "#F472B6";
          ctx.font = "bold 13px -apple-system, 'Hiragino Sans', sans-serif";
          ctx.fillText("★ AIおすすめ", W - PAD - 100, iy);
        }
        if (item.memo) {
          iy += LINE * 0.55;
          ctx.fillStyle = "#BE185D";
          ctx.font = "12px -apple-system, 'Hiragino Sans', sans-serif";
          ctx.globalAlpha = 0.6;
          const memo = item.memo.replace(/\n/g, " ／ ");
          ctx.fillText("   " + (memo.length > 36 ? memo.slice(0, 36) + "…" : memo), PAD + 24, iy);
          ctx.globalAlpha = 1;
        }
        iy += LINE;
      });
    }
    y += cardH + 16;
  });

  // フッター
  ctx.fillStyle = "#FBCFE8";
  ctx.font = "11px -apple-system, 'Hiragino Sans', sans-serif";
  ctx.fillText("KuraBe", PAD, totalH - 14);

  canvas.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "kurabe_比較メモ.png";
    a.click();
  }, "image/png");
}
function uid() { return Math.random().toString(36).slice(2, 10); }

const OK_IMG = ["image/jpeg", "image/png", "image/gif", "image/webp"];
// 画像dataURLをAI対応形式(JPEG)に統一しつつ縮小する。変換できなければnull。
function ensureJpeg(dataUrl) {
  return new Promise(resolve => {
    const m = dataUrl.match(/^data:([^;]+);/);
    if (m && OK_IMG.includes(m[1])) { resolve(dataUrl); return; }
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height, max = 1280;
      if (Math.max(w, h) > max) { const s = max / Math.max(w, h); w = Math.round(w * s); h = Math.round(h * s); }
      const c = document.createElement("canvas");
      c.width = w; c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      try { resolve(c.toDataURL("image/jpeg", 0.85)); } catch { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = dataUrl;
  });
}
// ファイルを読み込み、縮小したJPEGのdataURLにして返す。
function fileToJpeg(file) {
  return new Promise(resolve => {
    const fr = new FileReader();
    fr.onload = async () => {
      const out = await ensureJpeg(fr.result);
      resolve(out || fr.result);
    };
    fr.onerror = () => resolve(null);
    fr.readAsDataURL(file);
  });
}

let state = load();
let currentCatId = null;
let aiResult = null;
let aiWinner = null;
let aiLoading = false;

function render() {
  const app = document.getElementById("app");
  if (!getApiKey()) { app.innerHTML = apiKeyView(); bindApiKey(); return; }
  if (currentCatId) {
    const cat = state.categories.find(c => c.id === currentCatId);
    if (cat) { app.innerHTML = compareView(cat); bindCompare(cat); return; }
  }
  app.innerHTML = listView();
  bindList();
}

function apiKeyView() {
  return `
    <div style="min-height:100vh;background:${C.bg};display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;">
      <span style="font-size:48px;margin-bottom:16px;">🔑</span>
      <h1 style="font-size:20px;font-weight:800;color:${C.text};margin-bottom:8px;">APIキーを設定</h1>
      <p style="font-size:13px;color:${C.textMuted};text-align:center;margin-bottom:28px;line-height:1.6;">Anthropic の APIキーを入力してね。<br>一度入力するとこの端末では次回から不要。</p>
      <input id="apikey-input" type="password" placeholder="sk-ant-..." style="width:100%;max-width:360px;padding:14px 16px;border:1.5px solid ${C.accentBorder};border-radius:16px;font-size:14px;color:${C.text};background:white;margin-bottom:16px;outline:none;">
      <button id="apikey-save" style="width:100%;max-width:360px;padding:14px;border:none;border-radius:20px;background:${C.accent};color:white;font-size:16px;font-weight:700;cursor:pointer;">保存して始める</button>
    </div>
  `;
}
function bindApiKey() {
  document.getElementById("apikey-save").addEventListener("click", () => {
    const k = document.getElementById("apikey-input").value.trim();
    if (!k) return;
    saveApiKey(k);
    render();
  });
  document.getElementById("apikey-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("apikey-save").click();
  });
}

// ===== リスト画面 =====
function listView() {
  const emojis = ["👜","🛋️","👗","💄","🕯️","🧴","📦","👟","🌸","🍽️"];
  const getEmoji = id => emojis[id.charCodeAt(0) % emojis.length];
  const cats = state.categories;
  return `
    <div style="min-height:100vh;background:${C.bg};display:flex;flex-direction:column;">
      <div style="background:white;padding:52px 20px 18px;position:sticky;top:0;z-index:10;border-bottom:1px solid ${C.border};box-shadow:${C.shadowSm};">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:22px;">🛍️</span>
            <div>
              <h1 style="font-size:22px;font-weight:800;color:${C.text};letter-spacing:0.06em;">KuraBe</h1>
              <p style="font-size:11px;color:${C.accent};font-weight:500;letter-spacing:0.08em;">✦ 買い物上手の比較メモ ✦</p>
            </div>
          </div>
          ${state.categories.length > 0 ? `<button id="btn-export" style="background:${C.accent};color:white;border:none;border-radius:20px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.05em;">書き出し</button>` : ""}
        </div>
      </div>
      <div style="flex:1;padding:20px 16px 120px;">
        ${cats.length === 0 ? `
          <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:80px;gap:12px;">
            <button id="btn-add-empty" style="background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 24px;border-radius:24px;">
              <span style="font-size:64px;filter:drop-shadow(0 4px 12px rgba(244,114,182,0.3));line-height:1;">🌸</span>
              <p style="font-size:15px;color:${C.accent};font-weight:700;">タップして始める</p>
              <p style="font-size:12px;color:${C.accentBorder};">比較したいものを追加しよう</p>
            </button>
          </div>
        ` : `
          <div style="display:flex;flex-direction:column;gap:12px;">
            ${cats.map(cat => `
              <div style="background:white;border-radius:18px;box-shadow:${C.shadowSm};border:1px solid ${C.border};display:flex;overflow:hidden;">
                <button class="btn-select" data-id="${cat.id}" style="flex:1;display:flex;align-items:center;gap:14px;padding:18px 16px;border:none;background:none;text-align:left;">
                  <span style="font-size:28px;flex-shrink:0;">${getEmoji(cat.id)}</span>
                  <div>
                    <p style="font-size:15px;font-weight:700;color:${C.text};">${escHtml(cat.name)}</p>
                    <p style="font-size:11px;color:${C.accent};margin-top:3px;font-weight:500;">${cat.items.length === 0 ? "候補を追加しよう ✦" : `${cat.items.length}件の候補`}</p>
                  </div>
                </button>
                <button class="btn-delete" data-id="${cat.id}" style="padding:18px 16px;border:none;background:none;color:${C.accentBorder};">
                  <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 3.5h12M4.5 3.5V2.5a1 1 0 011-1h4a1 1 0 011 1v1M5.5 6.5v5M9.5 6.5v5M2.5 3.5l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
              </div>
            `).join("")}
          </div>
        `}
      </div>
      <div style="position:fixed;bottom:32px;right:20px;">
        <button id="btn-add-fab" style="width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,${C.accent},${C.accentDark});color:white;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(219,39,119,0.35);">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    ${addModal()}
  `;
}

function addModal() {
  return `
    <div id="modal" style="display:none;position:fixed;inset:0;z-index:50;background:rgba(131,24,67,0.18);backdrop-filter:blur(2px);align-items:flex-end;">
      <div style="width:100%;background:#fff;border-radius:24px 24px 0 0;padding:28px 20px 40px;box-shadow:0 -8px 32px rgba(244,114,182,0.15);">
        <div style="width:36px;height:4px;background:${C.accentBorder};border-radius:99px;margin:0 auto 20px;"></div>
        <p style="font-size:13px;color:${C.textMuted};margin-bottom:6px;font-weight:600;letter-spacing:0.04em;">比較したいものは？</p>
        <input id="modal-input" type="text" placeholder="例：3段ラック、ミニバッグ、日焼け止め"
          style="width:100%;border:1.5px solid ${C.accentBorder};border-radius:14px;padding:13px 16px;font-size:15px;color:${C.text};outline:none;background:${C.accentLight};">
        <div style="display:flex;gap:10px;margin-top:14px;">
          <button id="modal-cancel" style="flex:1;padding:13px;border-radius:14px;border:1.5px solid ${C.accentBorder};color:${C.textMuted};font-size:14px;font-weight:500;background:white;">キャンセル</button>
          <button id="modal-ok" style="flex:1;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,${C.accent},${C.accentDark});color:white;font-size:14px;font-weight:700;">追加する ✦</button>
        </div>
      </div>
    </div>
  `;
}

function bindList() {
  const showModal = () => {
    const m = document.getElementById("modal");
    m.style.display = "flex";
    document.getElementById("modal-input").value = "";
    setTimeout(() => document.getElementById("modal-input").focus(), 50);
  };
  const hideModal = () => { document.getElementById("modal").style.display = "none"; };
  const doAdd = () => {
    const v = document.getElementById("modal-input").value.trim();
    if (!v) return;
    state.categories.push({ id: uid(), name: v, items: [] });
    save(state); hideModal(); render();
  };
  document.getElementById("btn-add-fab")?.addEventListener("click", showModal);
  document.getElementById("btn-add-empty")?.addEventListener("click", showModal);
  document.getElementById("modal-cancel")?.addEventListener("click", hideModal);
  document.getElementById("modal-ok")?.addEventListener("click", doAdd);
  document.getElementById("modal")?.addEventListener("click", e => { if (e.target === document.getElementById("modal")) hideModal(); });
  document.getElementById("modal-input")?.addEventListener("keydown", e => { if (e.key === "Enter") doAdd(); });
  document.getElementById("btn-export")?.addEventListener("click", exportData);
  document.querySelectorAll(".btn-select").forEach(btn => {
    btn.addEventListener("click", () => { currentCatId = btn.dataset.id; aiResult = null; aiWinner = null; render(); });
  });
  document.querySelectorAll(".btn-delete").forEach(btn => {
    btn.addEventListener("click", () => {
      if (!confirm("このカテゴリを削除する？")) return;
      state.categories = state.categories.filter(c => c.id !== btn.dataset.id);
      save(state); render();
    });
  });
}

// ===== 比較画面 =====
function compareView(cat) {
  const canAsk = cat.items.length >= 2 && !aiLoading;
  return `
    <div style="min-height:100vh;background:${C.bg};display:flex;flex-direction:column;">
      <div style="background:white;padding:52px 16px 14px;position:sticky;top:0;z-index:10;border-bottom:1px solid ${C.border};box-shadow:${C.shadowSm};">
        <div style="display:flex;align-items:center;gap:10px;">
          <button id="btn-back" style="width:36px;height:36px;border-radius:12px;border:1.5px solid ${C.border};background:${C.accentLight};display:flex;align-items:center;justify-content:center;color:${C.textMuted};flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11 3.5L5.5 9 11 14.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <div>
            <h2 style="font-size:16px;font-weight:800;color:${C.text};">${escHtml(cat.name)}</h2>
            <p style="font-size:11px;color:${C.accent};font-weight:500;">${cat.items.length}件の候補を比較中</p>
          </div>
        </div>
      </div>

      ${aiResult ? `
        <div style="margin:16px 16px 0;background:linear-gradient(135deg,${C.accentLight},white);border-radius:18px;border:1.5px solid ${C.accentBorder};padding:16px 18px;position:relative;box-shadow:${C.shadow};">
          <button id="btn-close-ai" style="position:absolute;top:10px;right:12px;background:none;border:none;color:${C.accentBorder};font-size:16px;line-height:1;">✕</button>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <span style="font-size:18px;">✨</span>
            <span style="font-size:13px;font-weight:800;color:${C.text};letter-spacing:0.04em;">AIのおすすめ結果</span>
          </div>
          <p style="font-size:13px;color:${C.text};line-height:1.8;white-space:pre-wrap;">${escHtml(aiResult)}</p>
          <div style="margin-top:10px;display:flex;align-items:center;gap:4px;color:${C.accent};">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><path d="M7 12s-5.5-3.5-5.5-7a3.5 3.5 0 017 0 3.5 3.5 0 017 0c0 3.5-5.5 7-5.5 7z" opacity="0.7"/></svg>
            <span style="font-size:10px;font-weight:600;letter-spacing:0.04em;">Powered by Claude AI</span>
          </div>
        </div>
      ` : ""}

      <div style="flex:1;padding-top:20px;padding-bottom:140px;">
        ${cat.items.length === 0 ? `
          <button id="btn-add-empty-detail" style="background:none;border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:80px;gap:12px;width:100%;cursor:pointer;">
            <span style="font-size:44px;">📸</span>
            <p style="font-size:14px;color:${C.accent};font-weight:600;">候補を追加してみて</p>
          </button>
        ` : `
          <div style="display:flex;gap:14px;padding:4px 16px 16px;overflow-x:auto;scroll-snap-type:x mandatory;">
            ${cat.items.map(item => productCard(item)).join("")}
          </div>
        `}
      </div>

      <div style="position:fixed;bottom:0;left:0;right:0;padding:16px 16px 32px;background:linear-gradient(to top,rgba(255,241,243,1) 70%,rgba(255,241,243,0));display:flex;gap:10px;align-items:flex-end;">
        <button id="btn-ask-ai" style="flex:1;padding:15px 0;border-radius:16px;border:none;background:${canAsk ? `linear-gradient(135deg,${C.accent},${C.accentDark})` : C.accentBorder};color:white;font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:${canAsk ? `0 6px 18px rgba(219,39,119,0.35)` : "none"};letter-spacing:0.04em;" ${canAsk ? "" : "disabled"}>
          ${aiLoading
            ? `<span style="font-size:16px;">⏳</span> AIが考え中…`
            : `<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1v3M8 12v3M1 8h3M12 8h3M3.05 3.05l2.12 2.12M10.83 10.83l2.12 2.12M10.83 5.17l2.12-2.12M3.05 12.95l2.12-2.12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="2" fill="currentColor" opacity="0.3"/></svg> AIに聞く`}
        </button>
        <button id="btn-add-item" style="width:52px;height:52px;border-radius:50%;border:1.5px solid ${C.accentBorder};background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(244,114,182,0.2);color:${C.accent};flex-shrink:0;">
          <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  `;
}

function productCard(item) {
  const isWinner = !!aiWinner && item.id === aiWinner;
  const photo = item.photo
    ? `<img src="${item.photo}" alt="" style="width:100%;height:100%;object-fit:cover;">`
    : `<div style="display:flex;flex-direction:column;align-items:center;gap:8px;color:${C.accentBorder};">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none"><path d="M4 9h2.5l2-3h7l2 3H22a2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V11a2 2 0 012-2z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="14" cy="16" r="4" stroke="currentColor" stroke-width="1.5"/></svg>
        <span style="font-size:11px;font-weight:500;color:${C.accent};">タップして写真を追加</span>
       </div>`;
  return `
    <div class="product-card" style="background:white;border-radius:20px;box-shadow:${isWinner ? `0 6px 24px rgba(219,39,119,0.22)` : C.shadowSm};border:${isWinner ? `2px solid ${C.accent}` : `1px solid ${C.border}`};flex-shrink:0;width:220px;overflow:hidden;display:flex;flex-direction:column;scroll-snap-align:start;position:relative;">
      ${isWinner ? `<div style="position:absolute;top:10px;left:10px;z-index:5;background:linear-gradient(135deg,${C.accent},${C.accentDark});color:white;font-size:10px;font-weight:700;padding:4px 10px;border-radius:99px;box-shadow:0 2px 8px rgba(219,39,119,0.3);">✨ AIのおすすめ</div>` : ""}
      <button class="btn-photo" data-id="${item.id}" style="width:100%;height:160px;background:${C.accentLight};border:none;display:flex;align-items:center;justify-content:center;overflow:hidden;">
        ${photo}
        <input type="file" accept="image/*" class="file-input" data-id="${item.id}" style="display:none;">
      </button>
      <div style="padding:12px 14px 4px;">
        <input type="text" class="item-name" data-id="${item.id}" value="${escAttr(item.name)}" placeholder="商品名"
          style="width:100%;font-size:13px;font-weight:700;color:${C.text};border:none;border-bottom:1.5px solid ${C.border};padding-bottom:6px;outline:none;background:none;">
      </div>
      <div style="padding:8px 14px 10px;flex:1;">
        <textarea class="item-memo" data-id="${item.id}" rows="4" placeholder="価格・気になる点・感想&#10;自由に書いてね"
          style="width:100%;font-size:12px;color:#9D174D;resize:none;outline:none;border:none;background:none;line-height:1.7;">${escHtml(item.memo)}</textarea>
      </div>
      <div style="padding:0 14px 14px;">
        <button class="btn-del-item" data-id="${item.id}" style="width:100%;padding:8px;border-radius:12px;border:1px solid ${C.border};background:none;color:${C.accentBorder};font-size:11px;display:flex;align-items:center;justify-content:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 15 15" fill="none"><path d="M1.5 3.5h12M4.5 3.5V2.5a1 1 0 011-1h4a1 1 0 011 1v1M5.5 6.5v5M9.5 6.5v5M2.5 3.5l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          削除
        </button>
      </div>
    </div>
  `;
}

function bindCompare(cat) {
  document.getElementById("btn-back")?.addEventListener("click", () => { currentCatId = null; aiResult = null; aiWinner = null; render(); });
  document.getElementById("btn-close-ai")?.addEventListener("click", () => { aiResult = null; aiWinner = null; render(); });

  const doAddItem = () => {
    cat.items.push({ id: uid(), name: "", photo: null, memo: "" });
    save(state); render();
  };
  document.getElementById("btn-add-item")?.addEventListener("click", doAddItem);
  document.getElementById("btn-add-empty-detail")?.addEventListener("click", doAddItem);

  document.getElementById("btn-ask-ai")?.addEventListener("click", async () => {
    if (cat.items.length < 2 || aiLoading) return;
    aiLoading = true; aiResult = null; aiWinner = null; render();
    try {
      const parts = [{
        type: "text",
        text: `「${cat.name}」で以下の${cat.items.length}つの候補を比較しています。各候補には番号（1〜${cat.items.length}）が付いていて、その直後にメモ、続けて写真が並んでいます。番号・メモ・写真の対応をよく確認して、どれが一番おすすめか選んでください。\n\n回答は必ず次の形式で書いてください。\n\nWINNER:（おすすめする候補の番号を半角数字で1つだけ）\n①おすすめ候補の名前\n②理由（2〜3行）\n③各候補の評価（番号ごとに◎○△で）\n\n1行目のWINNER:の番号と、①で挙げる名前は必ず同じ候補を指すこと。20〜30代女性目線で率直に答えてね。`
      }];
      for (let i = 0; i < cat.items.length; i++) {
        const item = cat.items[i];
        const label = item.name || `（名前未記入）`;
        parts.push({ type: "text", text: `\n\n【候補${i + 1}：${label}】\nメモ：${item.memo || "（記入なし）"}\n↓この候補${i + 1}の写真：` });
        if (item.photo) {
          const match = item.photo.match(/^data:([^;]+);base64,(.+)$/);
          if (match) parts.push({ type: "image", source: { type: "base64", media_type: match[1], data: match[2] } });
        } else {
          parts.push({ type: "text", text: "（写真なし）" });
        }
      }
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": getApiKey(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: parts }] })
      });
      const data = await resp.json();
      if (!resp.ok || data.error) {
        const msg = data.error?.message || "";
        if (resp.status === 401 || /x-api-key|authentication/i.test(msg)) {
          aiLoading = false;
          alert("APIキーが無効だよ。新しいキーを設定し直してね。");
          localStorage.removeItem("kurabe_api_key");
          render();
          return;
        }
        if (resp.status === 429) {
          aiResult = "今アクセスが混み合ってるみたい。少し待ってもう一度試してね。";
        } else {
          aiResult = "AIエラー（" + resp.status + "）：" + (msg || "もう一度試してみてね。");
        }
      } else {
        aiResult = data.content?.map(b => b.text || "").join("") || "判定できませんでした";
        const m = aiResult.match(/WINNER:\s*(\d+)/i);
        if (m) {
          const idx = parseInt(m[1], 10) - 1;
          if (cat.items[idx]) aiWinner = cat.items[idx].id;
        }
        aiResult = aiResult.replace(/WINNER:\s*\d+\s*\n?/i, "").trim();
      }
    } catch (e) {
      aiResult = "通信エラーが発生したよ。電波の良いところでもう一度試してね。";
    }
    aiLoading = false; render();
  });

  document.querySelectorAll(".btn-photo").forEach(btn => {
    btn.addEventListener("click", () => btn.querySelector(".file-input").click());
  });
  document.querySelectorAll(".file-input").forEach(input => {
    input.addEventListener("change", e => {
      const f = e.target.files?.[0]; if (!f) return;
      const r = new FileReader();
      r.onload = ev => {
        const item = cat.items.find(i => i.id === input.dataset.id);
        if (item) { item.photo = ev.target.result; save(state); render(); }
      };
      r.readAsDataURL(f);
    });
  });
  document.querySelectorAll(".item-name").forEach(input => {
    input.addEventListener("input", e => {
      const item = cat.items.find(i => i.id === input.dataset.id);
      if (item) { item.name = e.target.value; save(state); }
    });
  });
  document.querySelectorAll(".item-memo").forEach(ta => {
    ta.addEventListener("input", e => {
      const item = cat.items.find(i => i.id === ta.dataset.id);
      if (item) { item.memo = e.target.value; save(state); }
    });
  });
  document.querySelectorAll(".btn-del-item").forEach(btn => {
    btn.addEventListener("click", () => {
      cat.items = cat.items.filter(i => i.id !== btn.dataset.id);
      save(state); render();
    });
  });
}

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function escAttr(s) { return escHtml(s); }

render();
</script>
</body>
</html>
